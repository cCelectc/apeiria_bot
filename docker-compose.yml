services:
  apeiria:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./.apeiria:/app/.apeiria
      - ./config:/app/config
      - ./cache:/app/cache
    restart: unless-stopped
